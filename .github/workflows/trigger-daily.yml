name: 每日触发财经早报

on:
  schedule:
    # 北京时间 8:00 = UTC 0:00
    - cron: '0 0 * * *'
  
  # 支持手动触发（方便测试）
  workflow_dispatch:

jobs:
  trigger-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: 触发扣子工作流
        run: |
          echo "开始触发财经早报工作流..."
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            --max-time 120 \
            https://fc5n2czq79.coze.site)
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "HTTP 状态码: $http_code"
          echo "响应内容: $body"
          
          if [ "$http_code" -eq 200 ]; then
            echo "✅ 触发成功！"
          else
            echo "❌ 触发失败，状态码: $http_code"
            exit 1
          fi
